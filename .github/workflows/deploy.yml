name: Build plugin ZIP (and optionally deploy to WordPress.org)

on:
  release:
    types: [published]

env:
  PLUGIN_SLUG: seamless-video-uploader

jobs:
  build:
    name: Build plugin ZIP
    runs-on: ubuntu-latest

    steps:
      # 1. Check out your repo at the release tag
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Prepare a clean build directory using .distignore
      - name: Prepare build directory
        # --delete keeps the build dir in sync if you rerun locally; not strictly needed in CI
        run: |
          mkdir -p build/${{ env.PLUGIN_SLUG }}
          rsync -rc --delete \
            --exclude-from='.distignore' \
            ./ build/${{ env.PLUGIN_SLUG }}/

      # 3. Create the ZIP (no __MACOSX, no hidden resource forks)
      - name: Create ZIP
        run: |
          cd build
          zip -r "../${{ env.PLUGIN_SLUG }}-${{ github.ref_name }}.zip" "${{ env.PLUGIN_SLUG }}/"

      # 4. Attach ZIP to the GitHub Release
      - name: Upload ZIP to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "${{ env.PLUGIN_SLUG }}-${{ github.ref_name }}.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------------------------------------------------
      # 5. Deploy to WordPress.org (COMMENTED OUT FOR NOW)
      #
      #    Uncomment this block once your plugin is approved and the SVN repo
      #    exists. At that point, you can:
      #      - either let 10up generate its own ZIP (generate-zip: true)
      #      - or keep generate-zip: false if you're only using the build ZIP
      # -----------------------------------------------------------------------

name: Create Plugin Release

on:
  release:
    types: [created]   # same as your theme workflow
  workflow_dispatch:    # allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # -----------------------------
      # Get release info (same pattern as theme)
      # -----------------------------
      - name: Get release info
        id: release_info
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag_name=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
            echo "upload_url=${{ github.event.release.upload_url }}" >> $GITHUB_OUTPUT
          else
            echo "tag_name=manual-build" >> $GITHUB_OUTPUT
          fi

      # -----------------------------
      # (Optional) Build step for plugin assets
      # If you have npm build, add it here like in your theme
      # -----------------------------
      # - name: Setup Node
      #   uses: actions/setup-node@v4
      #   with:
      #     node-version: 18
      #
      # - name: Install npm dependencies
      #   run: npm install
      #
      # - name: Build assets
      #   run: npm run build

      # -----------------------------
      # Create clean plugin package
      # -----------------------------
      - name: Create plugin zip
        run: |
          mkdir -p /tmp/seamless-video-uploader

          rsync -av --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='.gitignore' \
            --exclude='.gitattributes' \
            --exclude='.DS_Store' \
            --exclude='__MACOSX' \
            --exclude='._*' \
            --exclude='*.log' \
            --exclude='coverage' \
            --exclude='tests' \
            ./ /tmp/seamless-video-uploader/

          cd /tmp
          zip -r seamless-video-uploader.zip seamless-video-uploader/

          # Move it back to workspace
          mv seamless-video-uploader.zip $GITHUB_WORKSPACE/

      # -----------------------------
      # Upload to GitHub Release
      # -----------------------------
      - name: Upload Release Asset
        if: github.event_name == 'release'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.release_info.outputs.upload_url }}
          asset_path: ./seamless-video-uploader.zip
          asset_name: seamless-video-uploader.zip
          asset_content_type: application/zip

      # -----------------------------
      # Upload artifact for manual runs
      # -----------------------------
      - name: Upload artifact (for manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: seamless-video-uploader
          path: seamless-video-uploader.zip


name: Create Plugin Release

on:
  release:
    types: [created]
  workflow_dispatch:

env:
  PLUGIN_SLUG: steveb27-video-uploader

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get release info
        id: release_info
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag_name=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
            echo "upload_url=${{ github.event.release.upload_url }}" >> $GITHUB_OUTPUT
          else
            echo "tag_name=manual-build" >> $GITHUB_OUTPUT
          fi

      # If you need npm build steps, add them here like in your theme workflow

      - name: Build distributable using .distignore
        run: |
          mkdir -p /tmp/${{ env.PLUGIN_SLUG }}

          # Copy everything except what's listed in .distignore
          rsync -rc --delete \
            --exclude-from='.distignore' \
            ./ /tmp/${{ env.PLUGIN_SLUG }}/

          cd /tmp
          zip -r ${{ env.PLUGIN_SLUG }}.zip ${{ env.PLUGIN_SLUG }}/
          mv ${{ env.PLUGIN_SLUG }}.zip $GITHUB_WORKSPACE/

      - name: Upload Release Asset
        if: github.event_name == 'release'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.release_info.outputs.upload_url }}
          asset_path: ./${{ env.PLUGIN_SLUG }}.zip
          asset_name: ${{ env.PLUGIN_SLUG }}.zip
          asset_content_type: application/zip

      - name: Upload artifact (for manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLUGIN_SLUG }}
          path: ${{ env.PLUGIN_SLUG }}.zip

      # --- Uncomment later when wp.org SVN is ready ---
